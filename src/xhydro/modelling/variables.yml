coordinates:
  # Dimensions
  subbasin_id:
    long_name: Subbasin ID
    description: Unique identifier for each subbasin in the model.
  dowsub_id:
    long_name: Downstream Subbasin ID
    description: Unique identifier for the downstream subbasin in the model.
  station_id:
    long_name: Observation Station ID
    description: Unique identifier for each observation station in the model.
  hru_id:
    long_name: HRU ID
    description: Unique identifier for each Hydrological Response Unit (HRU) in the Raven model.
  rhhu_id:
    long_name: RHHU ID
    description: Unique identifier for each Relatively Homogeneous Hydrological Unit (RHHU) in the HYDROTEL model.

  # Drainage area and coordinates
  longitude:
    long_name: Longitude of the subbasin outlet
    units: degrees_east
  latitude:
    long_name: Latitude of the subbasin outlet
    units: degrees_north
  drainage_area:
    long_name: Drainage area
    units: km2

  subbasin_centroid_longitude:
    long_name: Longitude of the centroid of the subbasin
    units: degrees_east
  subbasin_centroid_latitude:
    long_name: Latitude of the centroid of the subbasin
    units: degrees_north
  subbasin_area:
    long_name: Area of the subbasin
    units: km2
  subbasin_elevation:
    long_name: Mean elevation of the subbasin
    units: m

  hru_centroid_longitude:
    long_name: Longitude of the centroid of the HRU
    units: degrees_east
  hru_centroid_latitude:
    long_name: Latitude of the centroid of the HRU
    units: degrees_north
  hru_area:
    long_name: Area of the HRU
    units: km2
  hru_elevation:
    long_name: Mean elevation of the HRU
    units: m

  rhhu_centroid_longitude:
    long_name: Longitude of the centroid of the RHHU
    units: degrees_east
  rhhu_centroid_latitude:
    long_name: Latitude of the centroid of the RHHU
    units: degrees_north
  rhhu_area:
    long_name: Area of the RHHU
    units: km2
  rhhu_elevation:
    long_name: Mean elevation of the RHHU
    units: m

# Variables
variables:
  q:
    standard_name: water_volume_transport_in_river_channel
    long_name: Simulated streamflow
    canonical_units: m3 s-1
    description: Simulated streamflow at the outlet of the subbasin.
    cell_methods: "time: mean"
