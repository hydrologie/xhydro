name: xhydro-dev
channels:
  - conda-forge
dependencies:
  - python >=3.10,<3.15
  # Remember to sync changes between environment.yml, environment-dev.yml, and pyproject.toml!
  # Main packages
  - cartopy >=0.23.0
  - clisops
  - fastprogress <1.1  # FIXME: Temporary fix following https://github.com/intake/intake-esm/pull/773. Remove when intake-esm (via xscen) is updated.
  - geopandas >=1.0
  - haversine >=2.8.1
  - matplotlib-base
  - numpy >=1.25
  - odc-stac
  - packaging
  - pandas >=2.2
  - planetary-computer
  - pooch >=1.8.0
  - pystac >=1.12.0
  - pystac-client
  - pyyaml >=6.0.2
  - rasterio
  - rioxarray >=0.15.0
  - scikit-learn
  - scipy >=1.12.0
  - shapely >=2.0
  - spotpy >=1.6.2
  - statsmodels >=0.14.0
  - tqdm
  - xarray >=2023.11.0
  - xarray-spatial >=0.3.7
  - xclim
  - xscen >=0.12.1,<0.15  # xscen controls the version of xclim
  - xvec
  # Leafmap
  - leafmap
  - mapclassify  # Hidden dependency needed to extract watershed delineation using leafmap objects
  # Raven
  - ravenpy >=0.18.1
  # Speedups
  - dask
  - dask-geopandas
  # Julia
  # - julia >=1.6.0  # Works locally, breaks remotely
  # - pyjuliacall >=0.9.20
  # Dev tools and testing
  - pip >=26.0
  - bump-my-version >=1.2.6
  - codespell >=2.4.1
  - deptry >=0.24.0
  - flake8 >=7.3.0
  - flake8-rst-docstrings >=0.4.0
  - flit >=3.11.0,<4.0
  - furo
  - ipykernel
  - ipython >=8.5.0
  - jupyter_client
  - mypy >=1.19.1
  - nbsphinx >=0.9.8
  - nbval >=0.11.0
  - numpydoc >=1.10.0
  - prek >=0.3.0
  - ruff >=0.15.0
  - watchdog >=6.0.0
  - sphinx >=8.0.0
  - sphinx-codeautolink >=0.16.2
  - sphinx-copybutton >=0.5.2
  - sphinx-intl
  - vulture >=2.14
  - watchdog >=6.0.0
  - yamllint >=1.38.0
  # Testing
  - coverage >=7.13.4
  - lmoments3 >=1.0.7
  - pytest >=9.0.2
  - pytest-cov >=7.0.0
  - pytest-xdist >=3.2
  - python-dotenv >=1.2.1
  - requests
  - xdatasets >=0.3.9
  # Notebooks
  - hvplot
  - xagg
  # Tox
  - tox >=4.41.0
  - tox-gh >=1.6.1
